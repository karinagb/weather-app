<!doctype html>
<html lang="">
  <head>
    <title>Weather App</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div id="app">
      <h1>Weather App</h1>

      <form>
        <label for="city">City or ZIP</label>
        <input id="city" name="city" placeholder="e.g. Berlin or 10115" />

        <label for="country">Country Code</label>
        <input id="country" name="country" placeholder="e.g. DE, CR, US" />

        <button type="submit">Search</button>
      </form>

      <div id="locationName"></div>

      <div class="dayData">
        <h2>Today</h2>
      </div>

      <div class="weekData">
        <h2>Week</h2>
        <div id="weekDay"></div>
      </div>

    </div>
  </body>
  <script src="./app.js"></script>
</html>
